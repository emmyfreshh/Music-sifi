{% extends "base.html" %}
{% block title %}Reset password | Music-sifi{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <div class="card">
      <div class="card-body p-4">
        <h1 class="h5 mb-2">Reset your password</h1>
        <p class="text-secondary small mb-3">Enter your account email and we’ll send you a reset link.</p>

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Email</label>
            {{ form.email }}
          </div>
          <button class="btn btn-primary w-100" type="submit">Send reset link</button>
        </form>

        <div class="mt-3 text-center">
          <a class="link-light" href="/accounts/login/">Back to login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
